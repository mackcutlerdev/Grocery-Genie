<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="index, follow">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="GroceryGenie" />
    <meta property="og:description" content="Smart pantry tracking, recipe matching, and automatic shopping lists — all in one kitchen companion." />
    <meta property="og:url" content="https://grocery-genie.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://grocery-genie.app/og-image.png" />

    />
